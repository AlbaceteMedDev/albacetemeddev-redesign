<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" preserveAspectRatio="xMidYMid meet">
  <title>Albacete MedDev — LinkedIn Banner</title>
  <desc>Editable banner. Each text element is its own layer (logo, services list, contact rows, partner names). The gold glow lives in linearGradient #goldBottomGlow — change stop-opacity values to tune intensity.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&amp;family=DM+Sans:wght@400;500;600&amp;display=swap');
      .sora { font-family: 'Sora', system-ui, sans-serif; }
      .dm   { font-family: 'DM Sans', system-ui, sans-serif; }
    ]]></style>

    <!-- ════════════════════════════════════════════
         EDIT-ME · GOLD BOTTOM GLOW
         Change stop-opacity values to tune intensity.
         Currently set to "less subtle" (peak 0.26).
         ════════════════════════════════════════════ -->
    <linearGradient id="goldBottomGlow" x1="0" y1="396" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#d4a94a" stop-opacity="0.26"/>
      <stop offset="0.16" stop-color="#d4a94a" stop-opacity="0.16"/>
      <stop offset="0.36" stop-color="#d4a94a" stop-opacity="0.07"/>
      <stop offset="0.62" stop-color="#d4a94a" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="darkBgGradient" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#05070c"/>
      <stop offset="0.5" stop-color="#0a0e17"/>
      <stop offset="1"   stop-color="#05070c"/>
    </linearGradient>

    <linearGradient id="servicesPill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a94a"/>
      <stop offset="1" stop-color="#e6c06b"/>
    </linearGradient>

    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,1 58,17 58,35 30,51 2,35 2,17" fill="none" stroke="#d4a94a" stroke-opacity="0.04" stroke-width="0.8"/>
    </pattern>

    <!-- Contact icon: phone -->
    <symbol id="iconPhone" viewBox="0 0 24 24">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.86 19.86 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" fill="none" stroke="#d4a94a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="iconMail" viewBox="0 0 24 24">
      <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="#d4a94a" stroke-width="1.8"/>
      <polyline points="22,6 12,13 2,6" fill="none" stroke="#d4a94a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="iconGlobe" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#d4a94a" stroke-width="1.8"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="#d4a94a" stroke-width="1.8"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="#d4a94a" stroke-width="1.8"/>
    </symbol>
  </defs>

  <!-- ─── Background layers ─── -->
  <g id="bg-dark">
    <rect width="1584" height="396" fill="url(#darkBgGradient)"/>
  </g>
  <g id="bg-hex-texture">
    <rect width="1584" height="396" fill="url(#hexPattern)"/>
  </g>
  <g id="bg-gold-glow">
    <rect width="1584" height="396" fill="url(#goldBottomGlow)"/>
  </g>

  <!-- ─── Logo (left column) ─── -->
  <g id="logo">
    <line id="logo-eyebrow-dash" x1="72" y1="98" x2="96" y2="98" stroke="#d4a94a" stroke-opacity="0.6" stroke-width="1"/>
    <text id="logo-eyebrow" class="sora" x="104" y="102" font-weight="500" font-size="11" fill="#d4a94a" letter-spacing="3.5">MEDICAL DEVICE DISTRIBUTION</text>
    <text id="logo-wordmark" class="sora" x="72" y="200" font-weight="800" font-size="104" fill="#f5f7fa" letter-spacing="-3.6">Albacete</text>
    <text id="logo-plus" class="sora" x="510" y="148" font-weight="600" font-size="50" fill="#d4a94a">+</text>
    <text id="logo-subline" class="sora" x="72" y="244" font-weight="500" font-size="18" fill="#cbd5e1" letter-spacing="10.8">M E D D E V</text>
  </g>

  <!-- ─── Services (middle column) ─── -->
  <g id="services">
    <g id="services-pill">
      <rect x="640" y="92" width="124" height="34" rx="17" fill="url(#servicesPill)"/>
      <text id="services-pill-label" class="sora" x="702" y="114" text-anchor="middle" font-weight="700" font-size="12" fill="#0a0e17" letter-spacing="2.6">SERVICES</text>
    </g>
    <g id="services-list">
      <circle cx="640" cy="158" r="3" fill="#d4a94a"/>
      <text id="service-1" class="dm" x="656" y="162" font-weight="500" font-size="19" fill="#f5f7fa">Conservative &amp; advanced wound care</text>
      <circle cx="640" cy="190" r="3" fill="#d4a94a"/>
      <text id="service-2" class="dm" x="656" y="194" font-weight="500" font-size="19" fill="#f5f7fa">Wound care capital equipment</text>
      <circle cx="640" cy="222" r="3" fill="#d4a94a"/>
      <text id="service-3" class="dm" x="656" y="226" font-weight="500" font-size="19" fill="#f5f7fa">Orthopedic surgical systems</text>
      <circle cx="640" cy="254" r="3" fill="#d4a94a"/>
      <text id="service-4" class="dm" x="656" y="258" font-weight="500" font-size="19" fill="#f5f7fa">Medical aesthetic capital equipment</text>
    </g>
  </g>

  <!-- ─── Contact (right column) ─── -->
  <g id="contact">
    <g id="contact-phone-row">
      <text id="contact-phone" class="dm" x="1456" y="142" text-anchor="end" font-weight="500" font-size="18" fill="#f5f7fa">551-497-3428</text>
      <circle cx="1488" cy="136" r="18" fill="#d4a94a" fill-opacity="0.10" stroke="#d4a94a" stroke-opacity="0.32"/>
      <use href="#iconPhone" x="1473" y="121" width="30" height="30"/>
    </g>
    <g id="contact-email-row">
      <text id="contact-email" class="dm" x="1456" y="190" text-anchor="end" font-weight="500" font-size="18" fill="#f5f7fa">gabe@albacetemeddev.com</text>
      <circle cx="1488" cy="184" r="18" fill="#d4a94a" fill-opacity="0.10" stroke="#d4a94a" stroke-opacity="0.32"/>
      <use href="#iconMail" x="1473" y="169" width="30" height="30"/>
    </g>
    <g id="contact-web-row">
      <text id="contact-web" class="dm" x="1456" y="238" text-anchor="end" font-weight="500" font-size="18" fill="#f5f7fa">albacetemeddev.com</text>
      <circle cx="1488" cy="232" r="18" fill="#d4a94a" fill-opacity="0.10" stroke="#d4a94a" stroke-opacity="0.32"/>
      <use href="#iconGlobe" x="1473" y="217" width="30" height="30"/>
    </g>
  </g>

  <!-- ─── Partners strip (bottom, full-width) ─── -->
  <g id="partners">
    <line id="partners-divider" x1="72" y1="316" x2="1512" y2="316" stroke="#d4a94a" stroke-opacity="0.18" stroke-width="1"/>
    <text id="partners-label" class="sora" x="72" y="346" font-weight="500" font-size="11" fill="#94a3b8" letter-spacing="3.5">PARTNERING WITH</text>
    <text id="partner-1" class="sora" x="950" y="346" font-weight="600" font-size="14" fill="#cbd5e1" letter-spacing="2.5" opacity="0.85">ITS</text>
    <text id="partner-2" class="sora" x="1052" y="346" font-weight="600" font-size="14" fill="#cbd5e1" letter-spacing="2.5" opacity="0.85">LUÑA</text>
    <text id="partner-3" class="sora" x="1158" y="346" font-weight="600" font-size="14" fill="#cbd5e1" letter-spacing="2.5" opacity="0.85">NEW HORIZON</text>
    <text id="partner-4" class="sora" x="1320" y="346" font-weight="600" font-size="14" fill="#cbd5e1" letter-spacing="2.5" opacity="0.85">SMITH+NEPHEW</text>
    <text id="partner-5" class="sora" x="1494" y="346" text-anchor="end" font-weight="600" font-size="14" fill="#cbd5e1" letter-spacing="2.5" opacity="0.85">THINK SURGICAL</text>
    <circle cx="1032" cy="343" r="1.5" fill="#d4a94a" fill-opacity="0.6"/>
    <circle cx="1138" cy="343" r="1.5" fill="#d4a94a" fill-opacity="0.6"/>
    <circle cx="1300" cy="343" r="1.5" fill="#d4a94a" fill-opacity="0.6"/>
    <circle cx="1378" cy="343" r="1.5" fill="#d4a94a" fill-opacity="0.6"/>
  </g>

</svg>
