<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 160" width="1140" height="160" preserveAspectRatio="xMidYMid meet">
  <title>Albacete MedDev — Email Signature</title>
  <desc>Editable banner. Each text element is a separate layer. The gold glow lives in the linearGradient #goldBottomGlow and can be tuned via its stop-opacity values.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&amp;family=DM+Sans:wght@400;500&amp;display=swap');
      .sora { font-family: 'Sora', system-ui, sans-serif; }
    ]]></style>

    <!-- ════════════════════════════════════════════
         EDIT-ME · GOLD BOTTOM GLOW
         Change stop-opacity values below to tune intensity.
         Higher = more vivid gold. Lower = subtler.
         ════════════════════════════════════════════ -->
    <linearGradient id="goldBottomGlow" x1="0" y1="160" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#d4a94a" stop-opacity="0.09"/>
      <stop offset="0.14" stop-color="#d4a94a" stop-opacity="0.05"/>
      <stop offset="0.30" stop-color="#d4a94a" stop-opacity="0.02"/>
      <stop offset="0.55" stop-color="#d4a94a" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="darkBgGradient" x1="0" y1="0" x2="1140" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#05070c"/>
      <stop offset="0.6" stop-color="#0a0e17"/>
      <stop offset="1"   stop-color="#05070c"/>
    </linearGradient>

    <linearGradient id="dividerGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#d4a94a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#d4a94a" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#d4a94a" stop-opacity="0"/>
    </linearGradient>

    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,1 58,17 58,35 30,51 2,35 2,17" fill="none" stroke="#d4a94a" stroke-opacity="0.045" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- ─── Background layers ─── -->
  <g id="bg-dark">
    <rect width="1140" height="160" fill="url(#darkBgGradient)"/>
  </g>
  <g id="bg-hex-texture">
    <rect width="1140" height="160" fill="url(#hexPattern)"/>
  </g>
  <g id="bg-gold-glow">
    <rect width="1140" height="160" fill="url(#goldBottomGlow)"/>
  </g>

  <!-- ─── Logo (left) ─── -->
  <g id="logo">
    <text id="logo-wordmark" class="sora" x="64" y="92" font-weight="800" font-size="60" fill="#f5f7fa" letter-spacing="-1.8">Albacete</text>
    <text id="logo-plus" class="sora" x="318" y="62" font-weight="600" font-size="30" fill="#d4a94a">+</text>
    <text id="logo-subline" class="sora" x="64" y="124" font-weight="500" font-size="13" fill="#cbd5e1" letter-spacing="7.15">M E D D E V</text>
  </g>

  <!-- ─── Center divider ─── -->
  <rect id="vertical-divider" x="570" y="36" width="1" height="88" fill="url(#dividerGradient)"/>

  <!-- ─── Tagline (right) ─── -->
  <g id="tagline">
    <line id="tagline-eyebrow-dash" x1="1052" y1="50" x2="1076" y2="50" stroke="#d4a94a" stroke-opacity="0.6" stroke-width="1"/>
    <text id="tagline-eyebrow" class="sora" x="1044" y="54" text-anchor="end" font-weight="500" font-size="10" fill="#d4a94a" letter-spacing="3.2" opacity="0.85">MEDICAL DEVICE DISTRIBUTION</text>
    <text id="tagline-line-1" class="sora" x="1076" y="92" text-anchor="end" font-weight="600" font-size="24" fill="#f5f7fa">Heal with <tspan fill="#d4a94a">Confidence.</tspan></text>
    <text id="tagline-line-2" class="sora" x="1076" y="124" text-anchor="end" font-weight="600" font-size="24" fill="#f5f7fa">Practice with <tspan fill="#d4a94a">Peace of Mind.</tspan></text>
  </g>

</svg>
