<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:512px;height:512px;background:transparent;overflow:hidden;}
  .icon{
    width:512px;height:512px;
    background:#05070c;
    border-radius:88px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  /* "A+" as a single inline unit. The plus is part of the text flow, sized
     and shifted as a superscript so the geometric center of the WHOLE
     A+ unit sits at the icon center. */
  .mark{
    display:inline-block;
    font-family:'Sora',-apple-system,system-ui,sans-serif;
    font-weight:900;
    font-size:380px;
    line-height:1;
    color:#ffffff;
    letter-spacing:-0.06em;
    /* Optical compensation: nudge unit down a touch so cap-height visually
       centers (fonts have more space above caps than below baseline). */
    transform:translateY(28px);
  }
  .plus{
    font-weight:700;
    font-size:0.38em;          /* ≈ 144px when parent is 380px */
    color:#ffffff;
    vertical-align:super;
    margin-left:-6px;
  }
</style>
</head>
<body>
<div class="icon"><span class="mark">A<span class="plus">+</span></span></div>
</body>
</html>
