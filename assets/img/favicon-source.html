<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:512px;height:512px;background:transparent;overflow:hidden;}
  .icon{
    width:512px;height:512px;
    background:#ffffff;
    border-radius:88px;
    position:relative;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  .a{
    font-family:'Sora',system-ui,sans-serif;
    font-weight:900;font-size:360px;
    color:#0a0e17;
    letter-spacing:-0.06em;
    line-height:1;
    position:relative;
    transform:translateX(-18px) translateY(8px);
  }
  .plus{
    font-family:'Sora',system-ui,sans-serif;
    font-weight:600;font-size:150px;
    color:#6b7280;
    position:absolute;
    top:74px;right:96px;
    line-height:1;
  }
</style>
</head>
<body>
<div class="icon">
  <span class="a">A</span>
  <span class="plus">+</span>
</div>
</body>
</html>
